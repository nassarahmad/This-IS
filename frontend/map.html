<!-- map -->
<!DOCTYPE html>
<html>
<head>
  <title>Map</title>
</head>
<body>

<h2>Map</h2>
<div id="map"></div>

<script>
async function loadMap(){
  const res = await fetch('http://localhost:3000/api/map');
  const data = await res.json();

  document.getElementById('map').innerHTML =
    data.map(p=>`<div>${p.lat}, ${p.lng}</div>`).join('');
}

loadMap();
</script>

</body>
</html>
